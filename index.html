<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>High Phone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    background: #06080f; color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; transition: background 0.25s ease;
    position: fixed; inset: 0;
    padding: env(safe-area-inset-top, 10px) 0 env(safe-area-inset-bottom, 10px);
  }
  body.airborne { background: radial-gradient(circle at 50% 25%, #1d3a8a 0%, #06080f 70%); }
  body.peak     { background: radial-gradient(circle at 50% 30%, #0a6e4a 0%, #06080f 70%); }

  #brand { font-size: 12px; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
  #player { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
  #player b { color: #6ea0ff; }
  #player button { background: none; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); border-radius: 999px; font-size: 11px; padding: 2px 9px; margin-left: 6px; font-weight: 600; }

  #label { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 0; min-height: 16px; font-weight: 600; }
  #number { font-size: 19vw; font-weight: 800; line-height: 0.95; font-variant-numeric: tabular-nums; letter-spacing: -2px; text-shadow: 0 0 60px rgba(80,140,255,0.45); }
  #unit { font-size: 4.4vw; font-weight: 600; color: rgba(255,255,255,0.6); }
  #feet { font-size: 3.6vw; font-weight: 500; color: rgba(255,255,255,0.4); margin-top: 2px; min-height: 1.2em; }
  #hint { font-size: 12px; color: rgba(255,255,255,0.45); padding: 4px 24px 0; font-weight: 500; min-height: 2.2em; }

  #clip { display: flex; flex-direction: column; align-items: center; gap: 7px; margin-top: 6px; }
  #flightVid { width: 42vw; max-width: 170px; max-height: 150px; border-radius: 14px; background: #000; box-shadow: 0 6px 24px rgba(0,0,0,.5); object-fit: cover; }
  #shareBtn { font-size: 14px; font-weight: 700; padding: 9px 20px; border-radius: 999px; border: none; background: #10b981; color: #fff; box-shadow: 0 4px 16px rgba(16,185,129,0.4); }
  #shareBtn:active { transform: scale(0.96); }

  #board { width: 100%; max-width: 420px; margin-top: 8px; padding: 0 22px; }
  #board h2 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 6px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #dot { width: 7px; height: 7px; border-radius: 50%; background: #16b56a; box-shadow: 0 0 8px #16b56a; }
  #dot.stale { background: #c9803a; box-shadow: 0 0 8px #c9803a; }
  #rows { display: flex; flex-direction: column; gap: 4px; }
  .row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.06); border-radius: 11px; padding: 6px 13px; font-size: 15px; transition: background 0.2s; }
  .row.me { background: rgba(46,107,255,0.28); }
  .row.fresh { background: rgba(16,185,129,0.35); }
  .row .rank { width: 22px; font-weight: 800; color: rgba(255,255,255,0.5); text-align: left; }
  .row .nm { flex: 1; text-align: left; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .ht { font-weight: 800; font-variant-numeric: tabular-nums; }
  .row .ft { font-size: 12px; color: rgba(255,255,255,0.5); width: 52px; text-align: right; }
  #empty { font-size: 13px; color: rgba(255,255,255,0.3); padding: 12px 0; }

  .overlay { position: fixed; inset: 0; background: rgba(6,8,15,0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 32px; z-index: 10; }
  .overlay h1 { font-size: 13vw; font-weight: 800; letter-spacing: -2px; }
  .overlay p { font-size: 16px; color: rgba(255,255,255,0.55); max-width: 320px; line-height: 1.5; }
  .overlay input[type=text] { font-size: 22px; text-align: center; padding: 14px 18px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; width: 100%; max-width: 300px; font-weight: 700; font-family: inherit; }
  #recToggle { display: flex; align-items: center; gap: 10px; font-size: 16px; color: rgba(255,255,255,0.75); font-weight: 600; }
  #recToggle input { width: 22px; height: 22px; accent-color: #10b981; }
  .btn { font-size: 20px; font-weight: 700; padding: 18px 44px; border-radius: 999px; border: none; background: #2f6bff; color: #fff; box-shadow: 0 8px 30px rgba(47,107,255,0.5); }
  .btn:active { transform: scale(0.96); }
  #err { color: #ff8080; font-size: 14px; min-height: 1.2em; max-width: 320px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="brand">High&nbsp;Phone 🚀</div>
  <div id="player">Player: <b id="pname">—</b><button id="changeBtn">change</button></div>

  <div id="label">Ready</div>
  <div id="number">0.00</div>
  <div id="unit">meters</div>
  <div id="feet">0.0 ft</div>
  <div id="hint">Toss your phone straight up &amp; catch it 🙌</div>

  <div id="clip" class="hidden">
    <video id="flightVid" playsinline muted loop autoplay></video>
    <button id="shareBtn">📹 Save / Share flight</button>
  </div>

  <div id="board">
    <h2><span id="dot"></span> Global Leaderboard</h2>
    <div id="rows"></div>
    <div id="empty">No tosses yet — be the first!</div>
  </div>

  <div id="start" class="overlay">
    <h1>HIGH&nbsp;PHONE</h1>
    <p>Throw your phone up and catch it. We'll measure how high it flew, film the flight, and rank you against everyone.</p>
    <input id="nameInput" type="text" placeholder="Your name" maxlength="14" autocomplete="off">
    <label id="recToggle"><input type="checkbox" id="recChk" checked> 📹 Record the flight</label>
    <button id="startBtn" class="btn">Start</button>
    <div id="err"></div>
  </div>

  <div id="nameOverlay" class="overlay hidden">
    <h1 style="font-size:9vw">Who's next?</h1>
    <input id="nameInput2" type="text" placeholder="Your name" maxlength="14" autocomplete="off">
    <button id="nameSaveBtn" class="btn">Let's go</button>
  </div>

<script>
(function () {
  "use strict";
  const G = 9.81;
  // FREEFALL_ENTER: below this magnitude (m/s^2) we treat the phone as airborne.
  // LAND_EXIT: a catch is a sharp impact spike — set high so a fast SPIN's
  // centripetal acceleration (a = w^2 * r, several m/s^2 in free fall) can't
  // fake a catch and prematurely cap the measured height.
  const FREEFALL_ENTER = 4.5, LAND_EXIT = 15, MIN_FLIGHT_MS = 120, MAX_FLIGHT_MS = 4000;
  const REC_TAIL_MS = 400;     // keep filming briefly after the catch
  const API = 'https://api.restful-api.dev/objects/ff8081819d82fab6019ecd2e92f3130c';
  const POLL_MS = 3000, MAX_STORE = 50, MAGIC = 'raza';
  const LS_NAME = 'highphone.name';

  const $ = function (id) { return document.getElementById(id); };
  const $number=$('number'),$unit=$('unit'),$feet=$('feet'),$label=$('label'),
        $hint=$('hint'),$rows=$('rows'),$empty=$('empty'),$pname=$('pname'),$dot=$('dot'),
        $clip=$('clip'),$vid=$('flightVid'),$shareBtn=$('shareBtn');

  let state='ready', releaseTime=0, rafId=null, player='Player';
  let board=[], freshId=null;

  // camera / recording
  let recordEnabled=false, stream=null, recorder=null, recMime='video/mp4';
  let chunks=[], keepClip=false, lastClipURL=null, lastClipBlob=null;

  // ---------- name ----------
  function loadName(){ try{ player = localStorage.getItem(LS_NAME) || 'Player'; }catch(e){} }
  function saveName(n){ player=(n||'').trim()||'Player'; try{ localStorage.setItem(LS_NAME,player); }catch(e){} $pname.textContent=player; }
  function isMagic(n){ return (n||'').trim().toLowerCase() === MAGIC; }

  // ---------- shared store ----------
  function fetchBoard(){
    return fetch(API,{cache:'no-store'}).then(function(r){return r.json();})
      .then(function(o){ return (o&&o.data&&Array.isArray(o.data.scores))?o.data.scores:[]; });
  }
  function putBoard(scores){
    return fetch(API,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:'highphone-leaderboard',data:{scores:scores}})});
  }
  function rankValue(e){ return isMagic(e.name)?Infinity:e.h; }
  function sortBoard(arr){ return arr.slice().sort(function(a,b){return rankValue(b)-rankValue(a);}); }
  function setSynced(ok){ $dot.classList.toggle('stale',!ok); $dot.title=ok?'Live':'Offline — local scores'; }

  function renderBoard(){
    const top=sortBoard(board).slice(0,6);
    $rows.innerHTML=''; $empty.classList.toggle('hidden',top.length>0);
    top.forEach(function(e,i){
      const row=document.createElement('div');
      row.className='row'+(e.id===freshId?' fresh':(e.name===player?' me':''));
      const medal=['🥇','🥈','🥉'][i]||(i+1);
      const goat=isMagic(e.name)?' 🐐':'';
      row.innerHTML='<span class="rank">'+medal+'</span><span class="nm"></span>'+
        '<span class="ht">'+e.h.toFixed(2)+'<span style="font-size:11px;opacity:.6">m</span></span>'+
        '<span class="ft">'+(e.h*3.28084).toFixed(1)+' ft</span>';
      row.querySelector('.nm').textContent=e.name+goat;
      $rows.appendChild(row);
    });
  }
  function syncBoard(){
    return fetchBoard().then(function(s){ board=s; setSynced(true); renderBoard(); })
      .catch(function(){ setSynced(false); });
  }
  function submitScore(h){
    const entry={id:'e'+Math.floor(performance.now())+'_'+Math.floor(Math.random()*1e6),name:player,h:h};
    freshId=entry.id; board=board.concat([entry]); renderBoard();
    return fetchBoard().then(function(scores){
      scores=scores.concat([entry]).sort(function(a,b){return rankValue(b)-rankValue(a);}).slice(0,MAX_STORE);
      return putBoard(scores).then(function(){ board=scores; setSynced(true); renderBoard(); });
    }).catch(function(){ setSynced(false); });
  }
  function myRank(){ const s=sortBoard(board); for(var i=0;i<s.length;i++){ if(s[i].id===freshId) return i+1; } return s.length; }

  // ---------- camera ----------
  function pickMime(){
    const c=['video/mp4','video/mp4;codecs=avc1.42E01E','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
    if(typeof MediaRecorder==='undefined') return '';
    for(var i=0;i<c.length;i++){ try{ if(MediaRecorder.isTypeSupported(c[i])) return c[i]; }catch(e){} }
    return '';
  }
  function setupCamera(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||typeof MediaRecorder==='undefined'){
      recordEnabled=false; return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
      .then(function(s){
        stream=s;
        var mime=pickMime();
        try{
          recorder=new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
          recMime=recorder.mimeType||mime||'video/mp4';
          recorder.ondataavailable=function(e){ if(e.data&&e.data.size) chunks.push(e.data); };
          recorder.onstop=onRecStop;
        }catch(e){ recordEnabled=false; }
      })
      .catch(function(){ recordEnabled=false; }); // denied → height+board still work
  }
  function startRec(){
    if(!recordEnabled||!recorder||recorder.state!=='inactive') return;
    chunks=[]; keepClip=true;
    try{ recorder.start(); }catch(e){}
  }
  function stopRec(keep){
    keepClip=keep;
    if(recorder&&recorder.state==='recording'){ try{ recorder.stop(); }catch(e){} }
  }
  function onRecStop(){
    if(!keepClip||!chunks.length){ chunks=[]; return; }
    var blob=new Blob(chunks,{type:recMime}); chunks=[];
    if(lastClipURL) URL.revokeObjectURL(lastClipURL);
    lastClipBlob=blob; lastClipURL=URL.createObjectURL(blob);
    $vid.src=lastClipURL; $clip.classList.remove('hidden');
    var p=$vid.play(); if(p&&p.catch) p.catch(function(){});
  }
  $shareBtn.addEventListener('click', function(){
    if(!lastClipBlob) return;
    var ext=(lastClipBlob.type.indexOf('webm')>=0)?'webm':'mp4';
    var file=new File([lastClipBlob],'high-phone-flight.'+ext,{type:lastClipBlob.type});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'High Phone flight 🚀'}).catch(function(){});
      return;
    }
    var a=document.createElement('a'); a.href=lastClipURL; a.download=file.name;
    document.body.appendChild(a); a.click(); a.remove();
  });

  // ---------- display / motion ----------
  function setHeight(m){ $number.textContent=m.toFixed(2); $feet.textContent=(m*3.28084).toFixed(1)+' ft'; }
  function liveLoop(){
    if(state==='airborne'){ var t=(performance.now()-releaseTime)/1000; setHeight(0.5*G*t*t); }
    rafId=requestAnimationFrame(liveLoop);
  }
  function onMotion(e){
    var a=e.accelerationIncludingGravity; if(!a||a.x==null) return;
    var mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z), now=performance.now();
    if(state==='ready'){
      if(mag<FREEFALL_ENTER){
        state='airborne'; releaseTime=now;
        document.body.classList.remove('peak'); document.body.classList.add('airborne');
        $clip.classList.add('hidden');
        $label.textContent='In the air…'; $unit.textContent='meters'; $hint.textContent='Catch it! 🙌';
        startRec();
      }
    } else if(state==='airborne'){
      var flight=now-releaseTime;
      if(mag>LAND_EXIT || flight>MAX_FLIGHT_MS){
        state='ready'; document.body.classList.remove('airborne');
        if(flight>=MIN_FLIGHT_MS && flight<=MAX_FLIGHT_MS){
          var T=flight/1000, peak=(G*T*T)/8;
          document.body.classList.add('peak'); setHeight(peak);
          setTimeout(function(){ stopRec(true); }, REC_TAIL_MS); // capture the catch
          submitScore(peak).then(function(){
            var rank=myRank();
            $label.textContent=(rank===1?'🏆 New #1!':'Peak height');
            $hint.textContent=player+' · airtime '+T.toFixed(2)+'s · global rank #'+rank+(recordEnabled?' · saving clip…':'');
            if(navigator.vibrate) navigator.vibrate(rank===1?[40,60,120]:60);
          });
        } else {
          stopRec(false);
          $label.textContent='Ready'; setHeight(0);
          $hint.textContent='Toss your phone straight up & catch it 🙌';
        }
      }
    }
  }

  function begin(){
    window.addEventListener('devicemotion', onMotion, true);
    state='ready'; setHeight(0); liveLoop();
    syncBoard(); setInterval(function(){ if(state!=='airborne') syncBoard(); }, POLL_MS);
  }

  // ---------- controls ----------
  $('startBtn').addEventListener('click', function(){
    $('err').textContent=''; saveName($('nameInput').value);
    recordEnabled = $('recChk').checked;
    if(recordEnabled) setupCamera();   // fire inside the gesture so iOS shows the camera prompt
    if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
      DeviceMotionEvent.requestPermission().then(function(res){
        if(res==='granted'){ $('start').classList.add('hidden'); begin(); }
        else { $('err').textContent='Motion access denied. Enable in Settings → Safari → Motion & Orientation Access.'; }
      }).catch(function(err){ $('err').textContent='Could not request motion access: '+err; });
    } else if(typeof DeviceMotionEvent!=='undefined'){ $('start').classList.add('hidden'); begin(); }
    else { $('err').textContent='This device/browser has no motion sensors. Open on a phone.'; }
  });
  $('changeBtn').addEventListener('click', function(){ $('nameInput2').value=''; $('nameOverlay').classList.remove('hidden'); $('nameInput2').focus(); });
  $('nameSaveBtn').addEventListener('click', function(){
    saveName($('nameInput2').value); $('nameOverlay').classList.add('hidden');
    $label.textContent='Ready'; setHeight(0); document.body.classList.remove('peak');
    $hint.textContent='Toss your phone straight up & catch it 🙌'; freshId=null; $clip.classList.add('hidden'); renderBoard();
  });

  // init
  loadName(); $pname.textContent=player; $('nameInput').value=(player==='Player'?'':player);
  syncBoard();
})();
</script>
</body>
</html>
